spring:
  application:
    name: godsaeng-up
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # 파일 업로드
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 파일 저장 경로
file:
  dir: C:/uploads/mission/